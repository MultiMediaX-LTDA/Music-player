name: Build Jammer APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Install Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
        target: aarch64-linux-android

    - name: Install cargo-ndk
      run: cargo install cargo-ndk

    - name: Build Rust
      run: |
        cd rust_scanner
        cargo ndk -t arm64-v8a -t armeabi-v7a -o ../app/src/main/jniLibs build --release
        
    - name: Build Debug APK
      run: ./gradlew assembleDebug
    
    - name: Rename APK
      run: mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/Jammer-$(date +%Y%m%d-%H%M).apk
    
    - name: Upload to Release
      uses: softprops/action-gh-release@v1
      with:
        files: app/build/outputs/apk/debug/*.apk
        tag_name: nightly-${{ github.run_number }}
        name: "Jammer Nightly Build #${{ github.run_number }}"
        body: "Build automático do Jammer. Baixe o APK direto."
        prerelease: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
